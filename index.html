function Ck({ checked, onChange }) {
  return <button onClick={onChange} style={{ width:22, height:22, borderRadius:6, padding:0,

    if(filter==="done")    return x.done;
    if(filter==="novas")   return !x.done&&x.new;
    if(filter==="all")     return !x.done;
    if(filter==="hary")    return !x.done&&x.resp==="Harysson";
    if(filter==="kiev")    return !x.done&&x.resp==="Kiev";
    if(filter==="lari")    return !x.done&&x.resp==="Lari";
    return !x.done&&x.prio===filter;

              {sec("📅 Agenda de hoje")}
              {TODAY_EVENTS.map(e=>(
                <div key={e.time} style={{display:"flex",gap:12,alignItems:"center",
                  padding:"10px 14px",borderRadius:9,background:"#fff",
                  border:`1px solid ${C.border}`,borderLeft:`4px solid ${e.color}`,
                  marginBottom:7}}>
                  <span style={{fontSize:12,color:C.muted,whiteSpace:"nowrap",
                    minWidth:92,fontFamily:"ui-monospace,monospace"}}>{e.time}</span>
                  <span style={{fontSize:14}}>{e.label}</span>
                </div>
              ))}

              {sec("⚠️ Alertas da semana",22)}
              {[
                {c:C.red,   t:"Qui 18 — Aluguel Torre Infinito compromisso de pagar amanhã. Harysson em cópia."},
                {c:C.red,   t:"Sex 19 — CONFLITO 10h: Contas a pagar R$ 26.533 vs Review Financeiro (Lucas + Lelis). Resolver hoje."},
                {c:C.red,   t:"SESMA — Convocação para reunião Hospital Mosqueiro. Abrir email e confirmar presença."},
                {c:C.yellow,t:"Sex 19 — Relatório Recebimentos Omie expira 19/06. Baixar antes de sexta."},
              ].map((a,i)=>(
                <div key={i} style={{display:"flex",gap:10,padding:"9px 13px",
                  borderRadius:8,background:a.c===C.red?C.redBg:C.yellowBg,
                  border:`1px solid ${a.c}33`,fontSize:13,color:a.c,
                  fontWeight:500,marginBottom:6,lineHeight:1.4}}>{a.t}</div>
              ))}

              {sec("🔗 Fontes monitoradas",22)}
              {[
                {n:"#_contas-a-pagar-onsaúde",m:"5 pendentes",  c:C.purple},
                {n:"#_contas-a-pagar-lf",     m:"3 pendentes",  c:C.purple},
                {n:"#financeiro-equipe",       m:"ver canal",    c:C.purple},
                {n:"📱 WhatsApp Web · Chrome",  m:"offline hoje", c:C.muted },
                {n:"✉️ Gmail",                  m:"7 novas",      c:C.blue  },
                {n:"🧾 Omie OnSaúde + LF",      m:"2 conferir",   c:C.accent},
              ].map(ch=>(
                <div key={ch.n} style={{display:"flex",justifyContent:"space-between",
                  alignItems:"center",padding:"8px 12px",borderRadius:7,
                  background:"#fff",border:`1px solid ${C.border}`,
                  fontSize:13,marginBottom:5}}>
                  <span style={{color:ch.c,fontWeight:500}}>{ch.n}</span>
                  <span style={{color:C.muted,fontSize:11}}>{ch.m}</span>
                </div>
              ))}
            </div>

            {/* col dir — demandas */}
            <div>
              <div style={{display:"flex",justifyContent:"space-between",
                alignItems:"flex-start",marginBottom:10,flexWrap:"wrap",gap:6}}>
                {sec(`📋 Demandas (${filtered.length})`)}
                <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                  {fbtn("all","Todas")}
                  {fbtn("novas","🆕")}
                  {fbtn("urgente","🔴")}
                  {fbtn("medio","🟡")}
                  {fbtn("esperar","🟢")}
                  {fbtn("hary","Hary")}
                  {fbtn("kiev","Kiev")}
                  {fbtn("lari","Lari")}
                  {fbtn("done","✅")}
                </div>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {filtered.length===0&&(
                  <p style={{color:C.muted,fontSize:14,textAlign:"center",padding:20}}>
                    {filter==="done"?"Nenhuma concluída ainda.":"Nenhuma pendente neste filtro."}
                  </p>
                )}
                {filtered.map(dm=>{
                  const p=PRIO[dm.prio], s=SRC_MAP[dm.src]||SRC_MAP.manual;
                  return (
                    <div key={dm.id} style={{display:"grid",gridTemplateColumns:"22px 1fr",
                      gap:12,alignItems:"flex-start",padding:"13px 15px",borderRadius:10,
                      background:dm.done?"transparent":"#fff",
                      border:`1px solid ${dm.done?C.border:dm.new?"#1570EF":C.border2}`,
                      opacity:dm.done?.5:1,transition:"all .2s",
                      boxShadow:dm.new&&!dm.done?"0 0 0 2px rgba(21,112,239,.12)":"none"}}>
                      <Ck checked={dm.done} onChange={()=>toggle(dm.id)}/>
                      <div>
                        <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:6}}>
                          {dm.new&&!dm.done&&<Badge color={C.blue} bg={C.blueBg}>🆕 NOVO</Badge>}
                          <Badge color={p.color} bg={p.bg}>{p.emoji} {p.label}</Badge>
                          <Badge color={s.color} bg={s.bg}>{s.label}</Badge>
                          {dm.resp&&dm.resp!=="—"&&<Badge color={C.soft} bg="rgba(0,0,0,.04)">{dm.resp}</Badge>}
                        </div>
                        <div style={{fontSize:14,lineHeight:1.5,
                          color:dm.done?C.muted:C.ink,
                          textDecoration:dm.done?"line-through":"none",
                          textDecorationColor:C.muted}}>{dm.txt}</div>
                        <div style={{fontSize:12,color:C.muted,marginTop:5}}>
                          {dm.from} · {dm.chan}
                        </div>
                      </div>
                    </div>
                  );
                })}

                {!addOpen?(
                  <button onClick={()=>setAddOpen(true)} style={{width:"100%",
                    padding:14,borderRadius:10,background:"#fff",
                    border:`1.5px dashed ${C.border2}`,color:C.muted,
                    fontSize:14,fontWeight:500,cursor:"pointer",fontFamily:"inherit",
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                    <span style={{fontSize:20,lineHeight:1}}>+</span> Adicionar tarefa
                  </button>
                ):(
                  <div style={{background:"#fff",border:`1.5px solid ${C.accent}`,
                    borderRadius:10,padding:16,display:"flex",flexDirection:"column",gap:10}}>
                    {inp(fText,setFText,"Descreva a demanda...",true)}
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {inp(fFrom,setFFrom,"De quem?",true)}
                      {inp(fResp,setFResp,"Responsável (Lari/Hary/Kiev)",true)}
                    </div>
                    <div>
                      <span style={{fontSize:11,color:C.muted,display:"block",marginBottom:5}}>Prioridade</span>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {optBtn("urgente","🔴 Urgente",fPrio,setFPrio)}
                        {optBtn("medio","🟡 Médio",fPrio,setFPrio)}
                        {optBtn("esperar","🟢 Pode esperar",fPrio,setFPrio)}
                      </div>
                    </div>
                    <div>
                      <span style={{fontSize:11,color:C.muted,display:"block",marginBottom:5}}>Fonte</span>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                        {["slack","whatsapp","gmail","omie","manual"].map(s=>optBtn(s,SRC_MAP[s].label,fSrc,setFSrc))}
                      </div>
                    </div>
                    <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                      <button onClick={()=>setAddOpen(false)} style={{padding:"8px 16px",
                        borderRadius:8,border:`1px solid ${C.border}`,background:"#fff",
                        color:C.soft,cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                        Cancelar
                      </button>
                      <button onClick={addTask} style={{padding:"8px 20px",borderRadius:8,
                        border:"none",background:C.accent,color:"#fff",fontWeight:700,
                        cursor:"pointer",fontSize:13,fontFamily:"inherit"}}>
                        Incluir
                      </button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}

        {/* ══ SEMANA ══ */}
        {tab==="semana"&&(
          <div>
            {sec("Visão da semana · 17–20/06")}
            {WEEK.map(w=>(
              <div key={w.day} style={{borderRadius:10,marginBottom:10,overflow:"hidden",
                border:`1px solid ${w.today?C.accent:C.border}`,
                borderLeft:`4px solid ${w.today?C.accent:w.alert?C.red:C.border2}`}}>
                <div style={{padding:"10px 16px",background:w.today?C.accentBg:"#fff"}}>
                  <div style={{fontSize:13,fontWeight:700,
                    color:w.today?C.accent:w.alert?C.red:C.blue}}>{w.day}</div>
                  {w.alert&&<div style={{fontSize:12,color:C.red,marginTop:3,fontWeight:600}}>{w.alert}</div>}
                </div>
                <div style={{padding:"8px 16px 12px",background:"#fff"}}>
                  {w.items.map(it=>(
                    <div key={it} style={{fontSize:13,marginTop:5,color:C.soft}}>{it}</div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ══ CONTAS ══ */}
        {tab==="contas"&&(
          <div>
            {sec("Contas a pagar da semana · 10h–10h30 · lembrete véspera + 10h")}
            <div style={{padding:"10px 14px",borderRadius:8,background:C.redBg,
              border:`1px solid ${C.red}33`,fontSize:13,color:C.red,
              fontWeight:500,marginBottom:14}}>
              ⚠️ Total da semana: R$ 68.550,55 + 8 DDAs BTG
            </div>
            {BILLS.map(b=>(
              <div key={b.date} style={{padding:"14px 16px",borderRadius:10,marginBottom:12,
                background:"#fff",border:`1px solid ${C.border}`,
                borderLeft:`4px solid ${b.done?C.green:C.red}`,
                opacity:b.done?.65:1}}>
                <div style={{display:"flex",justifyContent:"space-between",
                  alignItems:"baseline",flexWrap:"wrap",gap:8,marginBottom:12}}>
                  <span style={{fontSize:13,fontWeight:700,color:b.done?C.green:C.red}}>
                    {b.done?"✅ ":""}{b.date}
                  </span>
                  <span style={{fontSize:13,color:C.soft,fontFamily:"ui-monospace,monospace"}}>
                    total {b.total}
                  </span>
                </div>
                {b.items.map((it,idx)=>(
                  <div key={idx} style={{display:"flex",justifyContent:"space-between",
                    gap:10,padding:"7px 0",
                    borderTop:idx?`1px solid ${C.border}`:"none",fontSize:14}}>
                    <span>
                      <span style={{color:C.muted,marginRight:6,fontSize:12,
                        fontFamily:"ui-monospace,monospace"}}>{idx+1}.</span>
                      {it[0]}
                      <span style={{color:C.muted,fontSize:12,marginLeft:6}}>({it[2]})</span>
                    </span>
                    <span style={{whiteSpace:"nowrap",fontFamily:"ui-monospace,monospace",
                      color:C.ink,fontWeight:600}}>{it[1]}</span>
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* ══ EQUIPE ══ */}
        {tab==="equipe"&&(
          <div>
            {sec("Estrutura e divisão · setor financeiro · definida 16/06/2026")}
            {TEAM.map(t=>(
              <div key={t.cls} style={{background:"#fff",border:`1px solid ${C.border}`,
                borderLeft:`4px solid ${t.border}`,borderRadius:12,
                padding:"18px 20px",marginBottom:14}}>
                <h3 style={{margin:0,fontSize:17,fontWeight:700,color:C.ink}}>{t.name}</h3>
                <div style={{fontSize:12,color:C.muted,textTransform:"uppercase",
                  letterSpacing:".05em",marginTop:2}}>{t.role}</div>
                <span style={{display:"inline-block",fontSize:11,fontWeight:700,
                  borderRadius:6,padding:"3px 10px",marginTop:8,
                  background:t.scopeBg,color:t.scopeInk,
                  border:`1px solid ${t.scopeInk}33`}}>{t.scope}</span>
                <ul style={{listStyle:"none",padding:0,margin:"12px 0 0"}}>
                  {t.items.map((it,idx)=>(
                    <li key={idx} style={{fontSize:14,padding:"7px 0 7px 20px",
                      position:"relative",borderTop:idx?`1px solid ${C.border}`:"none",
                      lineHeight:1.5,color:C.soft}}>
                      <span style={{position:"absolute",left:2,top:16,width:7,height:2,
                        borderRadius:2,background:t.border,display:"block"}}/>
                      {it.bold
                        ?<strong style={{color:C.ink,fontWeight:600}}>{it.text}</strong>
                        :it.text}
                    </li>
                  ))}
                </ul>
              </div>
            ))}
          </div>
        )}

        {/* FOOTER */}
        <div style={{marginTop:30,paddingTop:16,borderTop:`1px solid ${C.border}`,
          fontSize:12,color:C.muted,lineHeight:1.7}}>
          <strong style={{color:C.soft}}>Fluxo:</strong> às 9h, ao abrir o Claude, o comando
          "triagem" varre Slack (MCP), Gmail, Omie Contas a Pagar e WhatsApp Web (Chrome quando
          disponível). Demandas classificadas 🔴🟡🟢, registradas na agenda e painel reabastecido.
          Harysson e Kiev monitorados 100%. WhatsApp offline hoje — verificar manualmente.
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<AgendaON />);
</script>
</body>
</html>
